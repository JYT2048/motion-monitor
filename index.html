<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运动姿态监测 | Motion Monitor</title>
<style>
  :root {
    --bg: #0a0e17;
    --card: #111827;
    --card-border: #1e293b;
    --accent: #06d6a0;
    --accent2: #118ab2;
    --danger: #ef476f;
    --warning: #ffd166;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --glow: rgba(6, 214, 160, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: linear-gradient(180deg, rgba(17,24,39,0.95), rgba(10,14,23,0.8));
    border-bottom: 1px solid var(--card-border);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
  }
  .header-title {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-sub {
    font-size: 12px; color: var(--text-muted); margin-top: 1px;
  }
  .status-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px; font-weight: 600;
    background: rgba(6,214,160,0.1);
    border: 1px solid rgba(6,214,160,0.3);
    color: var(--accent);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 2s infinite;
  }
  .status-badge.inactive {
    background: rgba(148,163,184,0.1);
    border-color: rgba(148,163,184,0.3);
    color: var(--text-muted);
  }
  .status-badge.inactive .status-dot {
    background: var(--text-muted);
    animation: none;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Main Layout */
  .main {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 20px;
    padding: 20px 32px;
    max-width: 1600px;
    margin: 0 auto;
    min-height: calc(100vh - 70px);
  }

  /* Video Section */
  .video-section {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    border: 1px solid var(--card-border);
    aspect-ratio: 16/9;
  }
  .video-section canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .video-overlay-top {
    position: absolute;
    top: 16px; left: 16px; right: 16px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }
  .fps-tag {
    background: rgba(0,0,0,0.6);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    backdrop-filter: blur(8px);
  }
  .rec-tag {
    display: flex; align-items: center; gap: 6px;
    background: rgba(239,71,111,0.2);
    border: 1px solid rgba(239,71,111,0.4);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--danger);
  }
  .rec-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--danger);
    animation: pulse-dot 1s infinite;
  }

  /* No camera state */
  .no-camera {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: linear-gradient(135deg, #0f172a, #1e1b4b);
  }
  .no-camera-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(6,214,160,0.1);
    border: 2px dashed rgba(6,214,160,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .no-camera h3 {
    font-size: 18px; font-weight: 600; color: var(--text);
  }
  .no-camera p {
    font-size: 14px; color: var(--text-muted); text-align: center; max-width: 300px;
  }
  .start-btn {
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: #000;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    pointer-events: auto;
  }
  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(6,214,160,0.3);
  }

  /* Camera Select */
  .cam-select-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    pointer-events: auto;
  }
  .cam-select {
    width: 260px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .cam-select:focus {
    border-color: var(--accent);
  }

  /* Error Toast */
  .error-toast {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(239,71,111,0.15);
    border: 1px solid rgba(239,71,111,0.4);
    backdrop-filter: blur(12px);
    padding: 10px 20px;
    border-radius: 10px;
    color: var(--danger);
    font-size: 13px;
    font-weight: 600;
    z-index: 10;
    max-width: 90%;
    text-align: center;
    line-height: 1.5;
  }
  .error-toast.info {
    background: rgba(6,214,160,0.12);
    border-color: rgba(6,214,160,0.3);
    color: var(--accent);
  }

  /* Side Panel */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 18px;
    transition: border-color 0.3s;
  }
  .card:hover {
    border-color: rgba(6,214,160,0.2);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon {
    font-size: 16px;
  }

  /* Motion State Card */
  .motion-state {
    text-align: center;
    padding: 24px 18px;
  }
  .motion-emoji {
    font-size: 48px;
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 12px rgba(6,214,160,0.3));
  }
  .motion-label {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .motion-sub {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* Angle Meters */
  .angles-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .angle-item {
    background: rgba(6,214,160,0.04);
    border: 1px solid rgba(6,214,160,0.1);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    transition: all 0.3s;
  }
  .angle-item:hover {
    border-color: rgba(6,214,160,0.25);
    background: rgba(6,214,160,0.08);
  }
  .angle-name {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .angle-value {
    font-size: 26px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .angle-unit {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* Exercise Counter */
  .counter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .counter-item {
    background: rgba(17,138,178,0.06);
    border: 1px solid rgba(17,138,178,0.15);
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
  }
  .counter-name {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .counter-value {
    font-size: 24px;
    font-weight: 800;
    color: var(--accent2);
    line-height: 1;
  }

  /* Joint Stats */
  .joint-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(30,41,59,0.5);
  }
  .joint-row:last-child { border-bottom: none; }
  .joint-name {
    font-size: 13px;
    color: var(--text-muted);
  }
  .joint-bar-wrap {
    flex: 1;
    margin: 0 12px;
    height: 4px;
    background: rgba(30,41,59,0.8);
    border-radius: 2px;
    overflow: hidden;
  }
  .joint-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .joint-val {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }

  /* Session Stats */
  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
  }
  .stats-label {
    font-size: 13px;
    color: var(--text-muted);
  }
  .stats-value {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  /* Controls */
  .controls-bar {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .ctrl-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    background: rgba(17,24,39,0.6);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .ctrl-btn:hover {
    border-color: var(--accent);
    background: rgba(6,214,160,0.08);
    color: var(--accent);
  }
  .ctrl-btn.active {
    background: rgba(6,214,160,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Responsive */
  @media (max-width: 900px) {
    .main {
      grid-template-columns: 1fr;
      padding: 16px;
    }
    .video-section { aspect-ratio: 4/3; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">M</div>
    <div>
      <div class="header-title">Motion Monitor</div>
      <div class="header-sub">实时运动姿态监测与分析</div>
    </div>
  </div>
  <div class="status-badge inactive" id="statusBadge">
    <span class="status-dot"></span>
    <span id="statusText">未启动</span>
  </div>
</div>

<div class="main">
  <!-- Video -->
  <div class="video-section" id="videoSection">
    <canvas id="outputCanvas"></canvas>
    <video id="inputVideo" style="display:none" playsinline></video>

    <div class="video-overlay-top" id="videoOverlay" style="display:none">
      <div class="fps-tag" id="fpsTag">-- FPS</div>
      <div class="rec-tag"><span class="rec-dot"></span> LIVE</div>
    </div>

    <div class="no-camera" id="noCamera">
      <div class="no-camera-icon">🏃</div>
      <h3>开始运动监测</h3>
      <p>选择摄像头后点击开启，系统将实时分析你的运动姿态</p>
      <div class="cam-select-wrap">
        <select class="cam-select" id="camSelect">
          <option value="">正在检测摄像头...</option>
        </select>
        <button class="start-btn" id="startBtn">开启摄像头</button>
      </div>
    </div>
    <div class="error-toast" id="errorToast" style="display:none"></div>
  </div>

  <!-- Side Panel -->
  <div class="side-panel">

    <!-- Motion State -->
    <div class="card motion-state">
      <div class="motion-emoji" id="motionEmoji">🧍</div>
      <div class="motion-label" id="motionLabel">等待检测</div>
      <div class="motion-sub" id="motionSub">开启摄像头后开始识别</div>
    </div>

    <!-- Joint Angles -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="icon">📐</span> 关节角度</div>
      </div>
      <div class="angles-grid">
        <div class="angle-item">
          <div class="angle-name">左肘</div>
          <div class="angle-value" id="leftElbow">--<span class="angle-unit">°</span></div>
        </div>
        <div class="angle-item">
          <div class="angle-name">右肘</div>
          <div class="angle-value" id="rightElbow">--<span class="angle-unit">°</span></div>
        </div>
        <div class="angle-item">
          <div class="angle-name">左膝</div>
          <div class="angle-value" id="leftKnee">--<span class="angle-unit">°</span></div>
        </div>
        <div class="angle-item">
          <div class="angle-name">右膝</div>
          <div class="angle-value" id="rightKnee">--<span class="angle-unit">°</span></div>
        </div>
        <div class="angle-item">
          <div class="angle-name">左肩</div>
          <div class="angle-value" id="leftShoulder">--<span class="angle-unit">°</span></div>
        </div>
        <div class="angle-item">
          <div class="angle-name">右肩</div>
          <div class="angle-value" id="rightShoulder">--<span class="angle-unit">°</span></div>
        </div>
      </div>
    </div>

    <!-- Exercise Counter -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="icon">🔢</span> 动作计数</div>
        <button class="ctrl-btn" style="flex:none;padding:4px 10px;font-size:11px" id="resetCountBtn">重置</button>
      </div>
      <div class="counter-grid">
        <div class="counter-item">
          <div class="counter-name">深蹲</div>
          <div class="counter-value" id="squatCount">0</div>
        </div>
        <div class="counter-item">
          <div class="counter-name">举手</div>
          <div class="counter-value" id="raiseCount">0</div>
        </div>
        <div class="counter-item">
          <div class="counter-name">跳跃</div>
          <div class="counter-value" id="jumpCount">0</div>
        </div>
      </div>
    </div>

    <!-- Body Stability -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="icon">🎯</span> 身体稳定性</div>
      </div>
      <div class="joint-row">
        <span class="joint-name">重心偏移</span>
        <div class="joint-bar-wrap"><div class="joint-bar" id="stabilityBar" style="width:0%"></div></div>
        <span class="joint-val" id="stabilityVal">--</span>
      </div>
      <div class="joint-row">
        <span class="joint-name">左右对称</span>
        <div class="joint-bar-wrap"><div class="joint-bar" id="symmetryBar" style="width:0%"></div></div>
        <span class="joint-val" id="symmetryVal">--</span>
      </div>
    </div>

    <!-- Session Stats -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="icon">📊</span> 会话统计</div>
      </div>
      <div class="stats-row">
        <span class="stats-label">检测时长</span>
        <span class="stats-value" id="sessionTime">00:00</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">运动时长</span>
        <span class="stats-value" id="activeTime">00:00</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">总动作数</span>
        <span class="stats-value" id="totalActions">0</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="card">
      <div class="controls-bar">
        <button class="ctrl-btn" id="toggleSkeleton">🦴 骨架</button>
        <button class="ctrl-btn" id="toggleAngles">📐 角度</button>
        <button class="ctrl-btn" id="toggleMetrics">📊 指标</button>
      </div>
    </div>

  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>

<script>
// =================== State ===================
const state = {
  running: false,
  showSkeleton: true,
  showAngles: true,
  showMetrics: true,
  sessionStart: null,
  activeSeconds: 0,
  counters: { squat: 0, raise: 0, jump: 0 },
  squatState: 'up',
  raiseState: 'down',
  jumpState: 'ground',
  jumpCooldown: 0,
  centerHistory: [],
  lastFrameTime: 0,
  fps: 0,
  fpsCounter: 0,
  fpsLastTime: 0,
  animFrameId: null,
  stream: null,
};

// =================== DOM ===================
const videoEl = document.getElementById('inputVideo');
const canvasEl = document.getElementById('outputCanvas');
const ctx = canvasEl.getContext('2d');
const camSelect = document.getElementById('camSelect');
const errorToast = document.getElementById('errorToast');

// =================== Enumerate Cameras ===================
async function enumerateCameras() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');

    camSelect.innerHTML = '';
    if (videoDevices.length === 0) {
      camSelect.innerHTML = '<option value="">未检测到摄像头</option>';
      return;
    }

    videoDevices.forEach((d, i) => {
      const opt = document.createElement('option');
      opt.value = d.deviceId;
      // Label may be empty before permission, will update after grant
      opt.textContent = d.label || `摄像头 ${i + 1}`;
      camSelect.appendChild(opt);
    });
  } catch (err) {
    console.warn('枚举摄像头失败:', err);
    camSelect.innerHTML = '<option value="">无法获取摄像头列表</option>';
  }
}

// Auto-enumerate on load
enumerateCameras();

// Re-enumerate when device changes
navigator.mediaDevices.addEventListener('devicechange', enumerateCameras);

// =================== Toast ===================
function showToast(msg, type = 'error', duration = 5000) {
  errorToast.textContent = msg;
  errorToast.className = 'error-toast' + (type === 'info' ? ' info' : '');
  errorToast.style.display = 'block';
  clearTimeout(errorToast._timer);
  errorToast._timer = setTimeout(() => {
    errorToast.style.display = 'none';
  }, duration);
}

// =================== MediaPipe Pose ===================
const pose = new Pose({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  enableSegmentation: false,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.5,
});

pose.onResults(onResults);

// =================== Camera Start ===================
document.getElementById('startBtn').addEventListener('click', startCamera);

async function startCamera() {
  const btn = document.getElementById('startBtn');
  btn.textContent = '正在启动...';
  btn.disabled = true;

  // Stop any existing stream
  if (state.stream) {
    state.stream.getTracks().forEach(t => t.stop());
    state.stream = null;
  }

  const deviceId = camSelect.value;
  const constraints = deviceId
    ? { video: { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } } }
    : { video: { width: { ideal: 1280 }, height: { ideal: 720 } } };

  try {
    // Try 1: Preferred resolution
    state.stream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch (e1) {
    console.warn('首次摄像头请求失败:', e1.name, e1.message);
    if (e1.name === 'NotAllowedError') {
      showToast('摄像头权限被拒绝，请在浏览器地址栏左侧点击图标，允许摄像头访问后刷新页面');
      btn.textContent = '开启摄像头';
      btn.disabled = false;
      return;
    }
    // Try 2: No specific device, lower resolution
    try {
      state.stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 640 }, height: { ideal: 480 } }
      });
      showToast('已降级到 640x480 分辨率', 'info', 3000);
    } catch (e2) {
      console.warn('降级摄像头请求失败:', e2.name, e2.message);
      // Try 3: Any video, no constraints
      try {
        state.stream = await navigator.mediaDevices.getUserMedia({ video: true });
        showToast('已使用最低分辨率', 'info', 3000);
      } catch (e3) {
        console.error('所有摄像头尝试失败:', e3);
        showToast(
          '无法启动摄像头。可能原因：\n1. 摄像头被其他程序占用（请关闭 Teams/微信/Zoom 等后重试）\n2. 没有可用摄像头\n3. 浏览器权限未授予',
          'error', 8000
        );
        btn.textContent = '开启摄像头';
        btn.disabled = false;
        return;
      }
    }
  }

  // Success
  videoEl.srcObject = state.stream;
  await videoEl.play();

  // Re-enumerate to get labels now that we have permission
  enumerateCameras();

  document.getElementById('noCamera').style.display = 'none';
  document.getElementById('videoOverlay').style.display = 'flex';

  state.running = true;
  state.sessionStart = Date.now();
  document.getElementById('statusBadge').className = 'status-badge';
  document.getElementById('statusText').textContent = '监测中';

  showToast('摄像头已启动 ✓', 'info', 2000);

  // Start frame loop
  processFrame();
}

// =================== Frame Processing Loop ===================
async function processFrame() {
  if (!state.running) return;

  if (videoEl.readyState >= 2) {
    try {
      await pose.send({ image: videoEl });
    } catch (e) {
      console.warn('Pose send error:', e);
    }
  }

  state.animFrameId = requestAnimationFrame(processFrame);
}

// =================== Results Handler ===================
function onResults(results) {
  // FPS
  updateFPS();

  canvasEl.width = results.image.width;
  canvasEl.height = results.image.height;

  ctx.save();
  ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);

  // Mirror
  ctx.translate(canvasEl.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(results.image, 0, 0, canvasEl.width, canvasEl.height);
  ctx.restore();

  if (!results.poseLandmarks) return;

  // Mirror landmarks for display
  const lm = results.poseLandmarks.map(p => ({
    x: 1 - p.x,
    y: p.y,
    z: p.z,
    visibility: p.visibility
  }));

  if (state.showSkeleton) {
    drawSkeleton(lm);
  }

  // Compute angles
  const angles = computeAngles(lm);
  updateAngleUI(angles);

  // Detect motion
  const motion = detectMotion(lm, angles);
  updateMotionUI(motion);

  // Stability
  computeStability(lm);
}

// =================== Drawing ===================
function drawSkeleton(lm) {
  const w = canvasEl.width;
  const h = canvasEl.height;

  // Connections
  const connections = [
    [11,12], [11,13], [13,15], [12,14], [14,16],
    [11,23], [12,24], [23,24],
    [23,25], [25,27], [24,26], [26,28],
    [15,17], [15,19], [16,18], [16,20],
    [27,29], [27,31], [28,30], [28,32],
  ];

  // Draw connections
  ctx.lineWidth = 3;
  connections.forEach(([i, j]) => {
    const a = lm[i], b = lm[j];
    if (a.visibility < 0.5 || b.visibility < 0.5) return;
    const grad = ctx.createLinearGradient(a.x*w, a.y*h, b.x*w, b.y*h);
    grad.addColorStop(0, 'rgba(6,214,160,0.8)');
    grad.addColorStop(1, 'rgba(17,138,178,0.8)');
    ctx.strokeStyle = grad;
    ctx.beginPath();
    ctx.moveTo(a.x*w, a.y*h);
    ctx.lineTo(b.x*w, b.y*h);
    ctx.stroke();
  });

  // Draw joints
  lm.forEach((p, i) => {
    if (p.visibility < 0.5) return;
    const x = p.x * w, y = p.y * h;
    // Glow
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(6,214,160,0.2)';
    ctx.fill();
    // Dot
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = [11,12,13,14,15,16,23,24,25,26,27,28].includes(i) ? '#06d6a0' : '#118ab2';
    ctx.fill();
  });

  // Draw angle arcs
  if (state.showAngles) {
    drawAngleArc(lm, 11, 13, 15, '左肘'); // left elbow
    drawAngleArc(lm, 12, 14, 16, '右肘'); // right elbow
    drawAngleArc(lm, 23, 25, 27, '左膝'); // left knee
    drawAngleArc(lm, 24, 26, 28, '右膝'); // right knee
  }
}

function drawAngleArc(lm, a, b, c, label) {
  const w = canvasEl.width, h = canvasEl.height;
  const pa = lm[a], pb = lm[b], pc = lm[c];
  if (pa.visibility < 0.5 || pb.visibility < 0.5 || pc.visibility < 0.5) return;

  const bx = pb.x * w, by = pb.y * h;
  const angle = calcAngle(pa, pb, pc);

  // Angle text
  ctx.font = 'bold 13px Segoe UI';
  ctx.fillStyle = 'rgba(6,214,160,0.9)';
  ctx.textAlign = 'center';
  ctx.fillText(Math.round(angle) + '°', bx, by - 16);
}

// =================== Angle Calculation ===================
function calcAngle(a, b, c) {
  const rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
  let angle = Math.abs(rad * 180 / Math.PI);
  if (angle > 180) angle = 360 - angle;
  return angle;
}

function computeAngles(lm) {
  return {
    leftElbow: calcAngle(lm[11], lm[13], lm[15]),
    rightElbow: calcAngle(lm[12], lm[14], lm[16]),
    leftKnee: calcAngle(lm[23], lm[25], lm[27]),
    rightKnee: calcAngle(lm[24], lm[26], lm[28]),
    leftShoulder: calcAngle(lm[13], lm[11], lm[23]),
    rightShoulder: calcAngle(lm[14], lm[12], lm[24]),
    leftHip: calcAngle(lm[11], lm[23], lm[25]),
    rightHip: calcAngle(lm[12], lm[24], lm[26]),
  };
}

// =================== Motion Detection ===================
function detectMotion(lm, angles) {
  const motion = { label: '站立', emoji: '🧍', sub: '保持放松' };

  const avgKnee = (angles.leftKnee + angles.rightKnee) / 2;
  const avgElbow = (angles.leftElbow + angles.rightElbow) / 2;
  const leftWristY = lm[15].y;
  const rightWristY = lm[16].y;
  const leftShoulderY = lm[11].y;
  const rightShoulderY = lm[12].y;
  const noseY = lm[0].y;

  // Jump detection: both feet significantly above baseline (y decreases upward)
  // Using hip-nose distance change
  const hipCenterY = (lm[23].y + lm[24].y) / 2;
  const ankleY = (lm[27].y + lm[28].y) / 2;

  // Squat detection
  if (avgKnee < 110) {
    state.squatState = 'down';
    motion.label = '深蹲中';
    motion.emoji = '🏋️';
    motion.sub = `膝角 ${Math.round(avgKnee)}° — 保持姿势`;
  } else if (state.squatState === 'down' && avgKnee >= 140) {
    state.squatState = 'up';
    state.counters.squat++;
    document.getElementById('squatCount').textContent = state.counters.squat;
    motion.label = '深蹲完成';
    motion.emoji = '✅';
    motion.sub = `已完成 ${state.counters.squat} 次`;
  }

  // Arm raise detection
  const leftArmUp = leftWristY < leftShoulderY - 0.05;
  const rightArmUp = rightWristY < rightShoulderY - 0.05;

  if (leftArmUp && rightArmUp) {
    state.raiseState = 'up';
    motion.label = '双手举起';
    motion.emoji = '🙌';
    motion.sub = '双手高举过肩';
  } else if (leftArmUp) {
    state.raiseState = 'up';
    motion.label = '左手举起';
    motion.emoji = '🙋';
    motion.sub = '左手高举过肩';
  } else if (rightArmUp) {
    state.raiseState = 'up';
    motion.label = '右手举起';
    motion.emoji = '🙋';
    motion.sub = '右手高举过肩';
  } else if (state.raiseState === 'up' && !leftArmUp && !rightArmUp) {
    state.raiseState = 'down';
    state.counters.raise++;
    document.getElementById('raiseCount').textContent = state.counters.raise;
  }

  // Jump detection (vertical displacement of ankles/hips)
  if (state.jumpCooldown > 0) {
    state.jumpCooldown--;
  }
  const currentHipsY = (lm[23].y + lm[24].y) / 2;
  state.centerHistory.push(currentHipsY);
  if (state.centerHistory.length > 30) state.centerHistory.shift();

  if (state.centerHistory.length >= 10 && state.jumpCooldown === 0) {
    const avgHips = state.centerHistory.reduce((a,b) => a+b, 0) / state.centerHistory.length;
    if (currentHipsY < avgHips - 0.06) {
      state.jumpState = 'air';
      state.counters.jump++;
      state.jumpCooldown = 20;
      document.getElementById('jumpCount').textContent = state.counters.jump;
    }
  }
  if (currentHipsY > (state.centerHistory[state.centerHistory.length - 2] || currentHipsY) + 0.02) {
    state.jumpState = 'ground';
  }

  if (state.jumpState === 'air') {
    motion.label = '跳跃中';
    motion.emoji = '🦘';
    motion.sub = `第 ${state.counters.jump} 次跳跃`;
  }

  // Walking / lateral movement
  if (state.centerHistory.length >= 15) {
    const recent = state.centerHistory.slice(-10);
    const avgHips = recent.reduce((a, b) => a + b, 0) / recent.length;
    const variance = recent.reduce((sum, v) => sum + Math.pow(v - avgHips, 2), 0) / recent.length;
    if (variance > 0.0003 && motion.label === '站立') {
      motion.label = '行走中';
      motion.emoji = '🚶';
      motion.sub = '检测到移动';
      state.activeSeconds += 0.033;
    }
  }

  // Active time for non-standing
  if (motion.label !== '站立') {
    state.activeSeconds += 0.033;
  }

  return motion;
}

// =================== Stability ===================
function computeStability(lm) {
  const leftShoulder = lm[11], rightShoulder = lm[12];
  const leftHip = lm[23], rightHip = lm[24];

  // Center offset
  const centerX = (leftShoulder.x + rightShoulder.x + leftHip.x + rightHip.x) / 4;
  const expectedCenter = 0.5;
  const offset = Math.abs(centerX - expectedCenter) * 100; // percentage

  // Symmetry: compare left-right angle differences
  const angles = computeAngles(lm);
  const elbowDiff = Math.abs(angles.leftElbow - angles.rightElbow);
  const kneeDiff = Math.abs(angles.leftKnee - angles.rightKnee);
  const symmetry = Math.max(0, 100 - (elbowDiff + kneeDiff) / 2);

  const stabilityScore = Math.max(0, Math.min(100, 100 - offset * 5));

  document.getElementById('stabilityBar').style.width = stabilityScore + '%';
  document.getElementById('stabilityVal').textContent = Math.round(stabilityScore) + '%';
  document.getElementById('symmetryBar').style.width = symmetry + '%';
  document.getElementById('symmetryVal').textContent = Math.round(symmetry) + '%';
}

// =================== UI Updates ===================
function updateAngleUI(angles) {
  document.getElementById('leftElbow').innerHTML = Math.round(angles.leftElbow) + '<span class="angle-unit">°</span>';
  document.getElementById('rightElbow').innerHTML = Math.round(angles.rightElbow) + '<span class="angle-unit">°</span>';
  document.getElementById('leftKnee').innerHTML = Math.round(angles.leftKnee) + '<span class="angle-unit">°</span>';
  document.getElementById('rightKnee').innerHTML = Math.round(angles.rightKnee) + '<span class="angle-unit">°</span>';
  document.getElementById('leftShoulder').innerHTML = Math.round(angles.leftShoulder) + '<span class="angle-unit">°</span>';
  document.getElementById('rightShoulder').innerHTML = Math.round(angles.rightShoulder) + '<span class="angle-unit">°</span>';
}

function updateMotionUI(motion) {
  document.getElementById('motionEmoji').textContent = motion.emoji;
  document.getElementById('motionLabel').textContent = motion.label;
  document.getElementById('motionSub').textContent = motion.sub;
}

function updateFPS() {
  state.fpsCounter++;
  const now = performance.now();
  if (now - state.fpsLastTime >= 1000) {
    state.fps = state.fpsCounter;
    state.fpsCounter = 0;
    state.fpsLastTime = now;
    document.getElementById('fpsTag').textContent = state.fps + ' FPS';
  }
}

// Session timer
setInterval(() => {
  if (!state.running || !state.sessionStart) return;
  const elapsed = Math.floor((Date.now() - state.sessionStart) / 1000);
  document.getElementById('sessionTime').textContent = formatTime(elapsed);
  document.getElementById('activeTime').textContent = formatTime(Math.floor(state.activeSeconds));
  document.getElementById('totalActions').textContent =
    state.counters.squat + state.counters.raise + state.counters.jump;
}, 1000);

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

// =================== Controls ===================
document.getElementById('toggleSkeleton').addEventListener('click', function() {
  state.showSkeleton = !state.showSkeleton;
  this.classList.toggle('active');
});
document.getElementById('toggleAngles').addEventListener('click', function() {
  state.showAngles = !state.showAngles;
  this.classList.toggle('active');
});
document.getElementById('toggleMetrics').addEventListener('click', function() {
  state.showMetrics = !state.showMetrics;
  this.classList.toggle('active');
});
document.getElementById('resetCountBtn').addEventListener('click', () => {
  state.counters = { squat: 0, raise: 0, jump: 0 };
  state.activeSeconds = 0;
  state.sessionStart = Date.now();
  document.getElementById('squatCount').textContent = '0';
  document.getElementById('raiseCount').textContent = '0';
  document.getElementById('jumpCount').textContent = '0';
});

// Init active states
document.getElementById('toggleSkeleton').classList.add('active');
document.getElementById('toggleAngles').classList.add('active');
document.getElementById('toggleMetrics').classList.add('active');
</script>
